name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release-mods:
    runs-on: ubuntu-latest
    env:
      COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse release version from commit message
        shell: bash
        run: |
          match="$(printf '%s' "$COMMIT_MESSAGE" | tr -d '\r' | grep -Eo 'Release[[:space:]]+[0-9]+\.[0-9]+\.[0-9]+\.?' | head -n 1 || true)"
          if [ -n "$match" ]; then
            version="$(printf '%s' "$match" | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1)"
            echo "VERSION=$version" >> "$GITHUB_ENV"
            echo "TITLE=Release $version" >> "$GITHUB_ENV"
            echo "ZIP_NAME=mods-$version.zip" >> "$GITHUB_ENV"
          else
            echo "No release marker found. Expected commit message to include: Release x.y.z or Release x.y.z."
            echo "SKIP_RELEASE=true" >> "$GITHUB_ENV"
          fi

      - name: Prevent duplicate release tags
        if: env.SKIP_RELEASE != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if git ls-remote --tags origin "refs/tags/$VERSION" | grep -q "$VERSION"; then
            echo "Tag '$VERSION' already exists. Refusing duplicate release." >&2
            exit 1
          fi
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release '$VERSION' already exists. Refusing duplicate release." >&2
            exit 1
          fi

      - name: Zip JAR files from mods directory
        if: env.SKIP_RELEASE != 'true'
        shell: bash
        run: |
          if [ ! -d mods ]; then
            echo "mods directory not found." >&2
            exit 1
          fi

          shopt -s nullglob
          jars=(mods/*.jar)
          if [ ${#jars[@]} -eq 0 ]; then
            echo "No .jar files found in mods/." >&2
            exit 1
          fi

          zip -j "$ZIP_NAME" mods/*.jar

      - name: Create GitHub release with zip asset
        if: env.SKIP_RELEASE != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "$VERSION" "$ZIP_NAME" --title "$TITLE" --notes "$TITLE"
